<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--meta http-equiv="Content-Security-Policy" 
          content="default-src 'none' 'nonce-rAnd0m';"-->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
</head>
<body>
    <canvas id="worldGrid" width="200" height="200"></canvas>
	<div id="controlsDiv">
		<progress id="simulationProgress" max="2000" value="0"></progress><span id="simulationProgressLabel">0/2000</span>

	</div>
</body>
<style>
	html, body {
		height: 100%;
		box-sizing: border-box;
	}
	canvas {
		display: block;
		border: 1px solid black;
		margin: 0 auto;
	}
	#controlsDiv {
		position: absolute; 
		bottom: 0; 
		left: 0;
		height: 50px;
		width: 100%;
	}
	#simulationProgress {
		width: calc(100% - 100px);
		margin-left: 20px;
		margin-right: 5px;
	}
	#simulationProgressLabel {
		width: 80px;
	}
</style>
<script>
const body = document.querySelector("body");
const worldGrid = document.getElementById("worldGrid");
const simulationProgress = document.getElementById("simulationProgress");
const simulationProgressLabel = document.getElementById("simulationProgressLabel");

function getCellColor(cell) {
	if (cell.type == "CELL_TYPE_EMPTY")
	{
		const color_amount = 255 - 25 * cell.food_amount;

		return `rgb(${color_amount} ${color_amount} 255)`;
	}
	else if (cell.type == "CELL_TYPE_WALL")
	{
		return "rgb(0 0 0)";
	}
	else if (cell.type == "CELL_TYPE_NEST")
	{
		return "#70d470";
	}
	else
	{
		//Unkown cell type
		return "rgb(255 0 255)";
	}
}

function drawGrid(event)
{
	simulationProgress.value = event.data.simulation.step_number;
	simulationProgressLabel.textContent = `${event.data.simulation.step_number}/2000`;

	const ctx = worldGrid.getContext("2d");
	let width = body.getBoundingClientRect().width - 20;
	let height = body.getBoundingClientRect().height - 10 - 50;
	const cells = event.data.simulation.map.cells; 
	const nb_row = cells.length; 
	const nb_col = cells[0].length;
	const cell_size = Math.min(width / nb_col, height / nb_row);
	worldGrid.width = nb_row * cell_size;
	worldGrid.height = nb_col * cell_size;
	for (let y = 0; y < cells.length; y++)
	{
		for (let x = 0; x < cells[y].length; x++)
		{
			const cell = cells[y][x];
			const cell_pos_x = x * cell_size;
			const cell_pos_y = (cells.length - y - 1) * cell_size;
			ctx.fillStyle = getCellColor(cell);
			ctx.fillRect(cell_pos_x, cell_pos_y, cell_size, cell_size);
			if (cell.nb_ants > 0)
			{
				ctx.fillStyle = "orange"; 
				ctx.beginPath();
				ctx.arc(cell_pos_x + cell_size / 2, cell_pos_y + cell_size / 2, cell_size / 2, 0, 2 * Math.PI);
				ctx.fill();
			}
		}
	}
}
window.addEventListener('message', event => {
	if (event.data.command == 'gridContent')
	{
		drawGrid(event.data);
	}
});
</script>
</html>
