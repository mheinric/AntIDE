<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--meta http-equiv="Content-Security-Policy" 
          content="default-src 'none' 'nonce-rAnd0m';"-->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
</head>
<body>
    <canvas id="worldGrid" width="200" height="200"></canvas>
	<div id="controlsDiv">
		<progress id="simulationProgress" max="2000" value="0"></progress><span id="simulationProgressLabel">0/2000</span><br>
		<span id="pheroLabel">Pheromones:</span>
		<button class="pheroButton" id="redChanButton">R</button>
		<button class="pheroButton" id="blueChanButton">B</button>
		<button class="pheroButton" id="greenChanButton">G</button>
		<button class="pheroButton" id="yellowChanButton">Y</button>

	</div>
</body>
<style>
	html, body {
		height: 100%;
		box-sizing: border-box;
	}
	canvas {
		display: block;
		border: 1px solid black;
		margin: 0 auto;
	}
	#controlsDiv {
		position: absolute; 
		bottom: 0; 
		left: 0;
		height: 50px;
		width: 100%;
	}
	#simulationProgress {
		width: calc(100% - 100px);
		margin-left: 20px;
		margin-right: 5px;
	}
	#simulationProgressLabel {
		width: 80px;
	}

	#pheroLabel {
		margin-left: 20px;
	}

	.pheroButton {
		margin: 0 3px;
		padding: 0px 7px;
		border-radius: 10px; 
		font-weight: bold;
		border: 1px solid #333;
		cursor: pointer;
		color: white;
		filter: grayscale(80%) brightness(120%);
	}

	.pheroButton.pheroEnable {
		filter: none;
	}

	#redChanButton
	{
		background-color: #db6767;
	}

	#blueChanButton
	{
		background-color: #9191eb;
	}

	#greenChanButton
	{
		background-color: #6bd46b;
	}

	#yellowChanButton
	{
		background-color: #cece06;
	}

	.pheroCB {
		display: none;
	}
</style>
<script>
const body = document.querySelector("body");
const worldGrid = document.getElementById("worldGrid");
const simulationProgress = document.getElementById("simulationProgress");
const simulationProgressLabel = document.getElementById("simulationProgressLabel");
const redChanButton = document.getElementById("redChanButton");
const blueChanButton = document.getElementById("blueChanButton");
const greenChanButton = document.getElementById("greenChanButton");
const yellowChanButton = document.getElementById("yellowChanButton");
const pheromoneButtons = [
	redChanButton,
	blueChanButton,
	greenChanButton,
	yellowChanButton,
];
var simData = null;

for (let button of pheromoneButtons) {
	button.onclick = () => { 
		button.classList.toggle("pheroEnable"); 
		updateGrid();
	};
}


function getCellColor(cell) {
	if (cell.type == 0)
	{
		const color_amount = 255 - 25 * cell.food_amount;

		return `rgb(${color_amount} ${color_amount} 255)`;
	}
	else if (cell.type == 1)
	{
		return "rgb(0 0 0)";
	}
	else if (cell.type == 2)
	{
		return "#70d470";
	}
	else
	{
		//Unkown cell type
		return "rgb(255 0 255)";
	}
}

function updateGrid()
{
	simulationProgress.value = simData.simulation.step_number;
	simulationProgressLabel.textContent = `${simData.simulation.step_number}/2000`;

	const ctx = worldGrid.getContext("2d");
	let width = body.getBoundingClientRect().width - 20;
	let height = body.getBoundingClientRect().height - 10 - 50;
	const cells = simData.simulation.map.cells; 
	const nb_row = cells.length; 
	const nb_col = cells[0].length;
	const cell_size = Math.min(width / nb_col, height / nb_row);
	worldGrid.width = nb_row * cell_size;
	worldGrid.height = nb_col * cell_size;
	ctx.clearRect(0, 0, worldGrid.width, worldGrid.height);
	const pheromone_colors = [
		"255,   0,   0", //RED
		"  0,   0, 255", //BLUE
		"  0, 255,   0", //GREEN
		"207, 193,  12", //YELLOW
	];
	const enabledPheromones = []; 
	for (let i = 0 ; i < 4; i++)
	{
		enabledPheromones.push(pheromoneButtons[i].classList.contains("pheroEnable"));	
	}
	for (let y = 0; y < cells.length; y++)
	{
		for (let x = 0; x < cells[y].length; x++)
		{
			const cell = cells[y][x];
			const cell_pos_x = x * cell_size;
			const cell_pos_y = (cells.length - y - 1) * cell_size;
			ctx.fillStyle = getCellColor(cell);
			ctx.fillRect(cell_pos_x, cell_pos_y, cell_size, cell_size);
			if (cell.nb_ants > 0)
			{
				ctx.fillStyle = "orange"; 
				ctx.beginPath();
				ctx.arc(cell_pos_x + cell_size / 2, cell_pos_y + cell_size / 2, cell_size / 2, 0, 2 * Math.PI);
				ctx.fill();
			}

			for (let i = 0; i < 4; i++)
			{
				if (cell.pheromones[i] > 0 && enabledPheromones[i])
				{
					ctx.fillStyle = `rgba(${pheromone_colors[i]}, ${cell.pheromones[i] / 255.0 / 4.0})`;
					ctx.fillRect(cell_pos_x, cell_pos_y, cell_size, cell_size);
				}
			}
		}
	}
}

function parseCell(data, start) {
	const pheromones = []; 
	for (let i = 0; i < 4; i++)
	{
		const ph_start = start + 10 + 2 * i;
		pheromones.push(Number('0x' + data.substring(ph_start, ph_start + 2)));
	}
	return {
		type: data[start] - '0',
		food_amount: data[start + 1] - '0',
		nb_ants: Number('0x' + data.substring(start + 2, start + 10)),
		pheromones: pheromones
	};
}

function parseData(data) {
	const map = data.simulation.map; 
	const BYTES_PER_CELL = 18; //Keep this value in sync with map.c

	const cells_matrix = []; 
	for (let y = 0; y < map.height; y++)
	{
		const row = [];
		for (let x = 0; x < map.width; x++)
		{
			const start = (x + map.width * y) * BYTES_PER_CELL;
			row.push(parseCell(map.cells, start));
		}
		cells_matrix.push(row);
	}
	map.cells = cells_matrix;
	return data;
}

window.addEventListener('message', event => {
	if (event.data.command == 'gridContent')
	{
		simData = parseData(event.data.data);
		updateGrid();
	}
});
</script>
</html>
