<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--meta http-equiv="Content-Security-Policy" 
          content="default-src 'none' 'nonce-rAnd0m';"-->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
</head>
<body>
    <canvas id="worldGrid" width="200" height="200"></canvas>
	<div id="detailsDiv" style="display: none;"></div>
	<div id="controlsDiv">
		<input type="range" id="simulationProgress" max="2000" value="0"><input type="number" value="0", id="simulationStepNumber" min="0" max="2000">/2000<br>
		<span id="pheroLabel">Pheromones:</span>
		<button class="pheroButton" id="redChanButton">R</button>
		<button class="pheroButton" id="blueChanButton">B</button>
		<button class="pheroButton" id="greenChanButton">G</button>
		<button class="pheroButton" id="yellowChanButton">Y</button>
		<span id="speedSelection">Speed:
			<input type="radio" name="speed" id="speedButtonx1" value="x1" checked><label for="speedButtonx1">x1</label>
			<input type="radio" name="speed" id="speedButtonx2" value="x2"><label for="speedButtonx2">x2</label>
			<input type="radio" name="speed" id="speedButtonx5" value="x5"><label for="speedButtonx5">x5</label>
			<input type="radio" name="speed" id="speedButtonx10" value="x10"><label for="speedButtonx10">x10</label>
			<input type="radio" name="speed" id="speedButtonxMax" value="xMax"><label for="speedButtonxMax">xMax</label>
		</span>

		<button id="refreshPageButton">Refresh</button>

	</div>
</body>
<style>
	* {
		font-family: monospace;
	}
	html, body {
		height: 100%;
		box-sizing: border-box;
	}
	canvas {
		display: block;
		border: 1px solid black;
		margin: 0 auto;
	}
	#detailsDiv {
		position: absolute; 
		top: 10px; 
		right: 10px; 
		width: 140px; 
		padding: 5px;
		border: 1px solid black;
		border-radius: 5px;
		background: #e9e9e9;
		opacity: 0.8;
		z-index: 2;
		pointer-events: none;
		font-size: 10px;
	}
	#controlsDiv {
		position: absolute; 
		bottom: 0; 
		left: 0;
		height: 50px;
		width: 100%;
	}
	#simulationProgress {
		width: calc(100% - 150px);
		margin-left: 20px;
		margin-right: 5px;
	}
	#simulationStepNumber {
		width: 60px;
	}

	#pheroLabel {
		margin-left: 20px;
	}

	.pheroButton {
		margin: 0;
		padding: 0px 7px;
		border-radius: 10px; 
		font-weight: bold;
		border: 1px solid #333;
		cursor: pointer;
		color: black;
		filter: grayscale(80%);
	}

	.pheroButton.pheroEnable {
		filter: none;
	}

	#redChanButton
	{
		background-color: #db6767;
	}

	#blueChanButton
	{
		background-color: #9191eb;
	}

	#greenChanButton
	{
		background-color: #4faf4f;
	}

	#yellowChanButton
	{
		background-color: #cece06;
	}

	.pheroCB {
		display: none;
	}

	#speedSelection input {
		display: none; 
	}

	#speedSelection label {
		border: 1px solid black;
		padding: 2px;
		border-radius: 3px;
		background-color: #DDD;
		cursor: pointer;
	}

	#speedSelection input:checked+label {
		background: rgb(152, 214, 152);
		font-weight: bold;
	}

	#speedSelection {
		margin-left: 10px;
	}

	#refreshPageButton {
		margin-left: 20px;
	}
</style>
<script>
const vscode = acquireVsCodeApi();
const body = document.querySelector("body");
const worldGrid = document.getElementById("worldGrid");
const detailsDiv = document.getElementById("detailsDiv");
const simulationProgress = document.getElementById("simulationProgress");
const simulationStepNumber = document.getElementById("simulationStepNumber");
const redChanButton = document.getElementById("redChanButton");
const blueChanButton = document.getElementById("blueChanButton");
const greenChanButton = document.getElementById("greenChanButton");
const yellowChanButton = document.getElementById("yellowChanButton");
const pheromoneButtons = [
	redChanButton,
	blueChanButton,
	greenChanButton,
	yellowChanButton,
];
const speedInputs = document.querySelectorAll("#speedSelection input");
const refreshPageButton = document.getElementById("refreshPageButton");


var simData = null;
var cellSize = -1;

simulationProgress.addEventListener("input", (event) => {
  simulationStepNumber.value = simulationProgress.value;
});

simulationProgress.addEventListener("mouseup", (event) => { 
	vscode.postMessage({
		command: 'setCurrentStep',
		payload: { step: Number(simulationProgress.value) }
	});
});

simulationStepNumber.addEventListener("change", (event) => {
	vscode.postMessage({
		command: 'setCurrentStep',
		payload: { step: Number(simulationStepNumber.value) }
	});
});

for (let button of pheromoneButtons) {
	button.onclick = () => { 
		button.classList.toggle("pheroEnable"); 
		updateGrid();
	};
}

refreshPageButton.onclick = () => {
	vscode.postMessage({
		command: 'refreshPage',
		payload: { }
	});
};

worldGrid.addEventListener("mouseleave", (event) => { 
	detailsDiv.style.display = "none";
});

worldGrid.addEventListener("mousemove", (event) => { 
	detailsDiv.style.display = "block";
	let worldGridRect = worldGrid.getBoundingClientRect();
	let posX = Math.floor((event.x - worldGridRect.x) / cellSize); 
	let posY = Math.floor((worldGrid.height - event.y + worldGridRect.y) / cellSize);
	let map = simData.simulation.map;
	let cellTypeNames = ["Empty", "Wall", "Nest"];
	if (posX >= 0 && posY >= 0 && posX < map.width && posY < map.height)
	{
		let cell = map.cells[map.height - posY - 1][posX];
		detailsDiv.innerHTML = `
			<strong>X:</strong> ${posX}, <strong>Y:</strong> ${posY}<br>
			<strong>Type:</strong> ${cellTypeNames[cell.type]}<br>
			<strong>Food:</strong> ${cell.food_amount}<br> 
			<strong>Red&nbsp;&nbsp;:</strong> ${("" + cell.pheromones[0]).padStart(3, '0')} <strong>Blue&nbsp;&nbsp;:</strong> ${("" + cell.pheromones[1]).padStart(3, '0')}<br>
			<strong>Green:</strong> ${("" + cell.pheromones[2]).padStart(3, '0')} <strong>Yellow:</strong> ${("" + cell.pheromones[3]).padStart(3, '0')}`;
	}
});

for (let speedInput of speedInputs)
{
	speedInput.onclick = () => {
		vscode.postMessage({
			command: 'setSimulationSpeed',
			payload: {
				speed: speedInput.value,
			}
		});
	};
}

function getCellColor(cell) {
	if (cell.type == 0)
	{
		const color_amount = 255 - 25 * cell.food_amount;

		return `rgb(${color_amount} ${color_amount} 255)`;
	}
	else if (cell.type == 1)
	{
		return "rgb(0 0 0)";
	}
	else if (cell.type == 2)
	{
		return "#70d470";
	}
	else
	{
		//Unkown cell type
		return "rgb(255 0 255)";
	}
}

function updateGrid()
{
	simulationProgress.value = simData.simulation.step_number;
	simulationStepNumber.value = simData.simulation.step_number;

	const ctx = worldGrid.getContext("2d");
	let width = body.getBoundingClientRect().width - 20;
	let height = body.getBoundingClientRect().height - 10 - 50;
	const cells = simData.simulation.map.cells; 
	const nb_row = cells.length; 
	const nb_col = cells[0].length;
	cellSize = Math.min(width / nb_col, height / nb_row);
	worldGrid.width = nb_row * cellSize;
	worldGrid.height = nb_col * cellSize;
	ctx.clearRect(0, 0, worldGrid.width, worldGrid.height);
	const pheromone_colors = [
		"255,   0,   0", //RED
		"  0,   0, 255", //BLUE
		"  0, 255,   0", //GREEN
		"207, 193,  12", //YELLOW
	];
	const enabledPheromones = []; 
	for (let i = 0 ; i < 4; i++)
	{
		enabledPheromones.push(pheromoneButtons[i].classList.contains("pheroEnable"));	
	}
	for (let y = 0; y < cells.length; y++)
	{
		for (let x = 0; x < cells[y].length; x++)
		{
			const cell = cells[y][x];
			const cell_pos_x = x * cellSize;
			const cell_pos_y = (cells.length - y - 1) * cellSize;
			ctx.fillStyle = getCellColor(cell);
			ctx.fillRect(cell_pos_x, cell_pos_y, cellSize, cellSize);
			if (cell.nb_ants > 0)
			{
				ctx.fillStyle = "orange"; 
				ctx.beginPath();
				ctx.arc(cell_pos_x + cellSize / 2, cell_pos_y + cellSize / 2, cellSize / 2, 0, 2 * Math.PI);
				ctx.fill();
			}

			for (let i = 0; i < 4; i++)
			{
				if (cell.pheromones[i] > 0 && enabledPheromones[i])
				{
					ctx.fillStyle = `rgba(${pheromone_colors[i]}, ${cell.pheromones[i] / 255.0 / 4.0})`;
					ctx.fillRect(cell_pos_x, cell_pos_y, cellSize, cellSize);
				}
			}
		}
	}
}

function parseCell(data, start) {
	const pheromones = []; 
	for (let i = 0; i < 4; i++)
	{
		const ph_start = start + 10 + 2 * i;
		pheromones.push(Number('0x' + data.substring(ph_start, ph_start + 2)));
	}
	return {
		type: data[start] - '0',
		food_amount: data[start + 1] - '0',
		nb_ants: Number('0x' + data.substring(start + 2, start + 10)),
		pheromones: pheromones
	};
}

function parseData(data) {
	const map = data.simulation.map; 
	const BYTES_PER_CELL = 18; //Keep this value in sync with map.c

	const cells_matrix = []; 
	for (let y = 0; y < map.height; y++)
	{
		const row = [];
		for (let x = 0; x < map.width; x++)
		{
			const start = (x + map.width * y) * BYTES_PER_CELL;
			row.push(parseCell(map.cells, start));
		}
		cells_matrix.push(row);
	}
	map.cells = cells_matrix;
	return data;
}

window.addEventListener('message', event => {
	if (event.data.command == 'gridContent')
	{
		simData = parseData(event.data.data);
		updateGrid();
		for (let speedInput of speedInputs)
		{
			if (speedInput.value == simData.speed)
			{
				speedInput.checked = true;
			}
		}
	}
});
</script>
</html>
